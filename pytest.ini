[pytest]
# Pytest configuration for the trading analytics platform

# Make pytest use conftest.py for path setup
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Add current directory to Python path
pythonpath = .

# Show extra info in test output
addopts = -v --tb=short

# Test discovery patterns
testpaths = tests
