<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Analytics Platform</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; }
        #root { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // Simple redirect to frontend or show status
        const App = () => {
            const [backendStatus, setBackendStatus] = React.useState('checking');
            
            React.useEffect(() => {
                // Check backend health
                fetch('http://localhost:8000/health')
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 'healthy') {
                            setBackendStatus('healthy');
                            // Redirect to full app (update URL to your frontend)
                            window.location.href = 'http://localhost:3003';
                        }
                    })
                    .catch(() => setBackendStatus('offline'));
            }, []);
            
            return (
                <div style={{ 
                    display: 'flex', 
                    justifyContent: 'center', 
                    alignItems: 'center', 
                    height: '100vh',
                    flexDirection: 'column',
                    gap: '20px'
                }}>
                    <h1>🚀 Trade Analytics Platform</h1>
                    <p>Loading...</p>
                    {backendStatus === 'offline' && (
                        <div style={{ color: 'red' }}>
                            <p>Backend is offline. Make sure to run:</p>
                            <code>python main.py</code>
                            <p>And frontend:</p>
                            <code>cd frontend && npm run dev</code>
                        </div>
                    )}
                </div>
            );
        };
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
