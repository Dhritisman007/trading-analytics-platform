# docker-compose.yml
version: "3.9"

services:

  api:
    build: .
    container_name: trading_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://trading_user:trading_pass@postgres:5432/trading_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models   # persist trained ML models
    restart: unless-stopped
    networks:
      - trading_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: trading_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - trading_net

  postgres:
    image: postgres:15-alpine
    container_name: trading_postgres
    environment:
      POSTGRES_USER:     trading_user
      POSTGRES_PASSWORD: trading_pass
      POSTGRES_DB:       trading_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U trading_user -d trading_db"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped
    networks:
      - trading_net

  redis:
    image: redis:7-alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped
    networks:
      - trading_net

volumes:
  postgres_data:
  redis_data:

networks:
  trading_net:
    driver: bridge